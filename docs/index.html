<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>UNICORN HOUSE — 포트폴리오 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#FAFAF9; --card:#FFFFFF; --well:#F5F5F4;
  --line:#EBEBEA; --line-dark:#E0E0DF;
  --tx:#111110; --tx2:#78716C; --tx3:#B8B4B0;
  --green:#0FBE4E; --neon:#1FE05F; --green-soft:rgba(31,224,95,.09);
  --ink:#111110; --red:#DC2E44;
  --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--tx);font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;min-height:100vh;font-feature-settings:"tnum"}
button,input,select{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::placeholder{color:var(--tx3)}

.micro{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--tx3);text-transform:uppercase}

/* ---------- 로고 ---------- */
.logo-chip{display:inline-flex;flex-direction:column;justify-content:center;background:var(--ink);color:var(--neon);border-radius:10px;padding:7px 10px;line-height:.94;font-weight:900;letter-spacing:-.02em;user-select:none}
.logo-chip span{display:block}

/* ---------- 잠금 화면 ---------- */
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;background:var(--bg)}
.gate-card{width:min(360px,90vw);text-align:center}
.gate-card .logo-chip{font-size:22px;border-radius:16px;padding:13px 18px;margin-bottom:14px}
.gate-sub{color:var(--tx2);font-size:14px;font-weight:500;margin-bottom:36px}
.gate-card input{width:100%;background:var(--card);border:1px solid var(--line-dark);border-radius:12px;padding:14px 16px;font-size:15px;outline:none;transition:all .15s;text-align:center;font-weight:600}
.gate-card input:focus{border-color:var(--tx);box-shadow:0 0 0 3px rgba(17,17,16,.06)}
.gate-card button{width:100%;margin-top:10px;background:var(--ink);color:var(--neon);border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.gate-card button:hover{opacity:.88}
.gate-card button:active{transform:scale(.985)}
.gate-err{color:var(--red);font-size:13px;font-weight:600;height:18px;margin-top:14px}
.shake{animation:shake .35s}
@keyframes shake{20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

/* ---------- 레이아웃 ---------- */
.wrap{max-width:1120px;margin:0 auto;padding:0 clamp(16px,3.5vw,32px) 64px}
header{display:flex;align-items:center;gap:13px;padding:22px 0 20px}
header .logo-chip{font-size:10.5px}
header .h-title{font-size:15.5px;font-weight:800;letter-spacing:-.02em}
header .h-sub{margin-left:auto;font-size:12px;color:var(--tx3);font-weight:500;text-align:right}
header .h-sub b{color:var(--tx2);font-weight:600;font-variant-numeric:tabular-nums}

.sec{margin-top:36px;margin-bottom:14px;display:flex;align-items:baseline;gap:10px}
.sec h2{font-size:16px;font-weight:800;letter-spacing:-.02em}
.sec .micro{transform:translateY(-1px)}

/* ---------- KPI : 한 카드 안에 4분할 ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.kpi{padding:24px 26px;position:relative}
.kpi+.kpi{border-left:1px solid var(--line)}
.kpi h3{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:14px}
.kpi .v{font-size:clamp(24px,2.4vw,30px);font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
.kpi .v .u{font-size:14px;font-weight:600;color:var(--tx2);letter-spacing:0;margin-left:2px}
.kpi .s{font-size:12px;color:var(--tx3);margin-top:8px;font-weight:500;font-variant-numeric:tabular-nums}
.kpi .s.up{color:var(--green);font-weight:700}
.kpi .tick{position:absolute;top:26px;right:24px;width:6px;height:6px;border-radius:50%;background:var(--neon)}
@media(max-width:860px){
  .kpis{grid-template-columns:1fr 1fr}
  .kpi:nth-child(3){border-left:none}
  .kpi:nth-child(n+3){border-top:1px solid var(--line)}
}

/* ---------- 인사이트 ---------- */
.insights{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
@media(max-width:860px){.insights{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px}
.panel-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.panel h4{font-size:14px;font-weight:800;letter-spacing:-.01em}

/* 랭킹 리스트 */
.rk-row{display:flex;align-items:center;gap:14px;padding:11px 0}
.rk-row+.rk-row{border-top:1px solid var(--line)}
.rk-num{font-size:12px;font-weight:800;color:var(--tx3);width:20px;font-variant-numeric:tabular-nums}
.rk-row.first .rk-num{color:var(--green)}
.rk-main{flex:1;min-width:0}
.rk-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px}
.rk-track{height:4px;border-radius:999px;background:var(--well);overflow:hidden}
.rk-fill{height:100%;border-radius:999px;background:var(--line-dark)}
.rk-row.first .rk-fill{background:var(--neon)}
.rk-val{font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.rk-row.first .rk-val{color:var(--green)}
.panel-empty{color:var(--tx3);font-size:13px;font-weight:500;padding:36px 0;text-align:center}

/* 플랫폼 비중 */
.stack{display:flex;height:10px;border-radius:999px;overflow:hidden;background:var(--well);margin:6px 0 20px}
.stack .sg1{background:var(--neon)}
.stack .sg2{background:var(--ink)}
.leg{display:flex;align-items:center;gap:10px;padding:12px 0}
.leg+.leg{border-top:1px solid var(--line)}
.leg .ldot{width:8px;height:8px;border-radius:3px}
.leg .ldot.g{background:var(--neon)}
.leg .ldot.k{background:var(--ink)}
.leg .ln{font-size:13.5px;font-weight:700;flex:1}
.leg .lv{font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums}
.leg .lp{font-size:12px;font-weight:600;color:var(--tx3);width:44px;text-align:right;font-variant-numeric:tabular-nums}

/* ---------- 컨트롤 ---------- */
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.controls input[type=search]{flex:1 1 200px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:13.5px;outline:none;font-weight:500;transition:all .15s}
.controls input[type=search]:focus{border-color:var(--tx)}
.controls select{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 32px 9px 13px;font-size:13px;font-weight:600;cursor:pointer;outline:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='9' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2378716C' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center}
.pills{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.pills button{background:none;border:none;border-radius:7px;padding:6px 13px;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .12s}
.pills button.on{background:var(--ink);color:#fff}

/* ---------- 카드 그리드 ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.vc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .16s}
.vc:hover{border-color:var(--line-dark);box-shadow:0 10px 30px rgba(17,17,16,.07);transform:translateY(-2px)}
.thumb{position:relative;aspect-ratio:16/9;background:var(--well);overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.thumb .ph svg{width:30px;height:30px;color:var(--tx3)}
.badge{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:999px;background:rgba(255,255,255,.94);color:var(--tx);backdrop-filter:blur(4px)}
.badge .bd{width:6px;height:6px;border-radius:50%}
.badge .bd.yt{background:#FF0000}
.badge .bd.ig{background:#DD2A7B}
.rank{position:absolute;top:10px;right:10px;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:var(--ink);color:#fff;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
.rank.r1{color:var(--neon)}
.vc-body{padding:16px 18px 17px}
.vc-client{font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:6px}
.vc-title{font-size:14.5px;font-weight:700;line-height:1.42;height:2.84em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:14px;letter-spacing:-.01em}
.vc-stats{display:flex;align-items:flex-end;gap:12px}
.vc-views .n{font-size:20px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.vc-views .l{font-size:10.5px;color:var(--tx3);font-weight:600;margin-bottom:3px}
.chg{font-size:12.5px;font-weight:700;margin-bottom:2px;white-space:nowrap;font-variant-numeric:tabular-nums}
.chg.up{color:var(--green)}
.chg.zero{color:var(--tx3)}
.chg.dn{color:var(--red)}
.spark{margin-left:auto;flex-shrink:0}
.spark polyline{fill:none;stroke:var(--neon);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.spark .fill{fill:url(#sg);stroke:none}
.empty{grid-column:1/-1;text-align:center;color:var(--tx3);padding:80px 0;font-size:14px;font-weight:500}

/* ---------- 모달 ---------- */
#modal{position:fixed;inset:0;background:rgba(17,17,16,.35);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;z-index:40}
#modal.on{display:flex}
.m-card{width:min(620px,100vw);max-height:92vh;overflow-y:auto;background:var(--card);border-radius:20px 20px 0 0;padding:26px 26px 30px;animation:up .26s cubic-bezier(.2,.9,.3,1)}
@media(min-width:700px){#modal{align-items:center;padding:20px}.m-card{border-radius:20px}}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.m-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.m-client{font-size:12px;font-weight:600;color:var(--tx2)}
.m-x{margin-left:auto;background:none;border:1px solid var(--line);width:32px;height:32px;border-radius:10px;font-size:13px;color:var(--tx2);cursor:pointer;flex-shrink:0;transition:all .15s}
.m-x:hover{border-color:var(--line-dark);color:var(--tx)}
.m-title{font-size:19px;font-weight:800;line-height:1.35;margin-bottom:22px;letter-spacing:-.02em}
.m-chart{border:1px solid var(--line);border-radius:14px;padding:16px 12px 6px;margin-bottom:14px}
.m-chart h5{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--tx3);text-transform:uppercase;margin:0 8px 4px}
.m-chart .none{color:var(--tx3);font-size:13px;font-weight:500;text-align:center;padding:34px 0}
.m-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(126px,1fr));gap:8px;margin-bottom:18px}
.m-stat{border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.m-stat .l{font-size:10.5px;color:var(--tx3);font-weight:600;margin-bottom:5px}
.m-stat .v{font-size:15.5px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.m-link{display:block;text-align:center;background:var(--ink);color:var(--neon);font-weight:700;font-size:14.5px;border-radius:12px;padding:15px;transition:all .15s}
.m-link:hover{opacity:.88}
.m-link:active{transform:scale(.99)}
.chart-line{fill:none;stroke:var(--neon);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.chart-dot{fill:var(--neon)}
.chart-lbl{fill:var(--tx3);font-size:10px;font-weight:600;font-family:inherit}
.chart-val{fill:var(--tx2);font-size:10px;font-weight:700}

footer{text-align:center;color:var(--tx3);font-size:12px;font-weight:500;padding:44px 0 8px}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <div class="logo-chip"><span>UNICORN</span><span>HOUSE</span></div>
    <div class="gate-sub">포트폴리오 대시보드</div>
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button id="go">들어가기</button>
    <div class="gate-err" id="err"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="wrap">
    <header>
      <div class="logo-chip"><span>UNICORN</span><span>HOUSE</span></div>
      <div class="h-title">포트폴리오 대시보드</div>
      <div class="h-sub">LAST UPDATE<br><b id="gen">-</b></div>
    </header>

    <div class="kpis" id="kpis"></div>

    <div class="sec"><h2>인사이트</h2><span class="micro">Insights</span></div>
    <div class="insights">
      <div class="panel">
        <div class="panel-top"><h4>오늘 뜨는 영상</h4><span class="micro">일일 증가</span></div>
        <div id="barchart"></div>
      </div>
      <div class="panel">
        <div class="panel-top"><h4>플랫폼 비중</h4><span class="micro">총 조회수</span></div>
        <div id="platchart"></div>
      </div>
    </div>

    <div class="sec"><h2>포트폴리오</h2><span class="micro" id="cnt"></span></div>
    <div class="controls">
      <input id="q" type="search" placeholder="제목·클라이언트 검색">
      <div class="pills" id="plat">
        <button data-v="" class="on">전체</button>
        <button data-v="유튜브">유튜브</button>
        <button data-v="인스타그램">인스타</button>
      </div>
      <select id="client"><option value="">모든 클라이언트</option></select>
      <select id="month"><option value="">전체 기간</option></select>
      <select id="sort">
        <option value="views">조회수순</option>
        <option value="daily">오늘 뜨는 순</option>
        <option value="date">최신순</option>
        <option value="weekly">주간 증가순</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
    <footer>매일 오전 9시 자동 업데이트 · UNICORN HOUSE</footer>
  </div>
</div>

<div id="modal"><div class="m-card" id="mcard"></div></div>

<svg width="0" height="0"><defs>
  <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1FE05F" stop-opacity=".18"/>
    <stop offset="1" stop-color="#1FE05F" stop-opacity="0"/>
  </linearGradient>
</defs></svg>

<script>
"use strict";
let DATA=null;
const S={q:"",plat:"",client:"",month:"",sort:"views"};
const $=s=>document.querySelector(s);
const CLAP='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M3 8l2.5-4.5L21 8M8.5 7.5L11 3M14 7.5L16.5 3"/></svg>';

/* ---------- 숫자 표기 ---------- */
function fmt(n){
  if(n==null)return"-";
  const a=Math.abs(n);
  if(a>=1e8)return trim(n/1e8)+"억";
  if(a>=1e4)return trim(n/1e4)+"만";
  return n.toLocaleString("ko-KR");
}
const trim=x=>{const v=Math.round(x*10)/10;return v%1===0?String(Math.round(v)):v.toFixed(1)};
const full=n=>n==null?"-":n.toLocaleString("ko-KR");

/* ---------- 복호화 ---------- */
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(blob,pw){
  pw=pw.trim().normalize("NFC");
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(blob.salt),iterations:blob.iter,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(blob.iv)},key,b64(blob.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlock(pw,silent){
  try{
    const res=await fetch("data.json?t="+Date.now());
    if(!res.ok)throw new Error("data");
    DATA=await decrypt(await res.json(),pw);
    sessionStorage.setItem("uh_pw",pw);
    $("#gate").style.display="none";$("#app").style.display="";
    boot();
  }catch(e){
    sessionStorage.removeItem("uh_pw");
    if(!silent){
      $("#err").textContent="비밀번호가 올바르지 않아요";
      const c=$(".gate-card");c.classList.remove("shake");void c.offsetWidth;c.classList.add("shake");
    }
  }
}
$("#go").onclick=()=>unlock($("#pw").value,false);
$("#pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock($("#pw").value,false)});
const saved=sessionStorage.getItem("uh_pw");
if(saved)unlock(saved,true);

/* ---------- 부팅 ---------- */
function boot(){
  $("#gen").textContent=DATA.generated;
  const clients=[...new Set(DATA.items.map(i=>i.client))].sort();
  $("#client").innerHTML='<option value="">모든 클라이언트</option>'+clients.map(c=>`<option>${esc(c)}</option>`).join("");
  const months=[...new Set(DATA.items.filter(i=>i.date).map(i=>i.date.slice(0,7)))].sort().reverse();
  $("#month").innerHTML='<option value="">전체 기간</option>'+months.map(m=>{
    const[y,mo]=m.split("-");return`<option value="${m}">${y}년 ${+mo}월</option>`}).join("");
  $("#q").oninput=e=>{S.q=e.target.value.trim();render()};
  $("#client").onchange=e=>{S.client=e.target.value;render()};
  $("#month").onchange=e=>{S.month=e.target.value;render()};
  $("#sort").onchange=e=>{S.sort=e.target.value;render()};
  document.querySelectorAll("#plat button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#plat button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");S.plat=b.dataset.v;render();
  });
  render();
}

function filtered(){
  let arr=DATA.items.filter(i=>
    (!S.plat||i.platform===S.plat)&&
    (!S.client||i.client===S.client)&&
    (!S.month||(i.date||"").startsWith(S.month))&&
    (!S.q||(i.title+i.client).toLowerCase().includes(S.q.toLowerCase())));
  const key={views:i=>i.views,daily:i=>i.daily??-1,weekly:i=>i.weekly??-1,date:i=>i.date||""}[S.sort];
  return arr.sort((a,b)=>key(b)>key(a)?1:key(b)<key(a)?-1:0);
}

/* ---------- 렌더 ---------- */
function render(){
  const arr=filtered();
  renderKpis(arr);
  renderRank(arr);
  renderPlat(arr);
  $("#cnt").textContent=arr.length+"개";
  $("#grid").innerHTML=arr.length?arr.map(card).join(""):'<div class="empty">조건에 맞는 영상이 없어요</div>';
  arr.forEach((it,i)=>{const el=document.getElementById("vc"+i);if(el)el.onclick=()=>openModal(it)});
}

function renderKpis(arr){
  const tv=arr.reduce((s,i)=>s+i.views,0);
  const td=arr.reduce((s,i)=>s+(i.daily||0),0);
  $("#kpis").innerHTML=`
    <div class="kpi"><span class="tick"></span><h3>총 조회수</h3>
      <div class="v">${fmt(tv)}</div><div class="s">${full(tv)}회</div></div>
    <div class="kpi"><h3>오늘 하루 증가</h3>
      <div class="v">${td>0?"+":""}${fmt(td)}</div><div class="s ${td>0?"up":""}">전일 대비</div></div>
    <div class="kpi"><h3>영상</h3>
      <div class="v">${arr.length}<span class="u">개</span></div>
      <div class="s">유튜브 ${arr.filter(i=>i.platform==="유튜브").length} · 인스타 ${arr.filter(i=>i.platform==="인스타그램").length}</div></div>
    <div class="kpi"><h3>클라이언트</h3>
      <div class="v">${new Set(arr.map(i=>i.client)).size}<span class="u">곳</span></div><div class="s">필터 기준</div></div>`;
}

function renderRank(arr){
  const top=arr.filter(i=>i.daily!=null&&i.daily>0).sort((a,b)=>b.daily-a.daily).slice(0,5);
  if(!top.length){$("#barchart").innerHTML='<div class="panel-empty">데이터가 하루 이상 쌓이면 표시돼요</div>';return}
  const max=top[0].daily;
  $("#barchart").innerHTML=top.map((i,idx)=>`
    <div class="rk-row${idx===0?" first":""}">
      <div class="rk-num">${String(idx+1).padStart(2,"0")}</div>
      <div class="rk-main">
        <div class="rk-name">${esc(i.title)}</div>
        <div class="rk-track"><div class="rk-fill" style="width:${Math.max(4,Math.round(i.daily/max*100))}%"></div></div>
      </div>
      <div class="rk-val">+${fmt(i.daily)}</div>
    </div>`).join("");
}

function renderPlat(arr){
  const yt=arr.filter(i=>i.platform==="유튜브").reduce((s,i)=>s+i.views,0);
  const ig=arr.filter(i=>i.platform==="인스타그램").reduce((s,i)=>s+i.views,0);
  const tot=yt+ig;
  if(!tot){$("#platchart").innerHTML='<div class="panel-empty">데이터가 없어요</div>';return}
  const yp=Math.round(yt/tot*100), ip=100-yp;
  $("#platchart").innerHTML=`
    <div class="stack"><div class="sg1" style="width:${yp}%"></div><div class="sg2" style="width:${ip}%"></div></div>
    <div class="leg"><span class="ldot g"></span><span class="ln">유튜브</span><span class="lv">${fmt(yt)}</span><span class="lp">${yp}%</span></div>
    <div class="leg"><span class="ldot k"></span><span class="ln">인스타그램</span><span class="lv">${fmt(ig)}</span><span class="lp">${ip}%</span></div>`;
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

function thumb(i){
  if(i.yt)return`<img loading="lazy" src="https://i.ytimg.com/vi/${i.yt}/hqdefault.jpg" alt="">`;
  return`<div class="ph">${CLAP}</div>`;
}
function chg(d){
  if(d==null)return"";
  const cls=d>0?"up":d<0?"dn":"zero";
  const sign=d>0?"+":"";
  return`<div class="chg ${cls}">${sign}${fmt(d)}</div>`;
}
function spark(h){
  if(!h||h.length<2)return"";
  const w=72,ht=32,vs=h.map(p=>p[1]);
  const min=Math.min(...vs),max=Math.max(...vs),rg=max-min||1;
  const pts=h.map((p,i)=>[(i/(h.length-1))*w,ht-3-((p[1]-min)/rg)*(ht-6)]);
  const line=pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  return`<svg class="spark" width="${w}" height="${ht}" viewBox="0 0 ${w} ${ht}">
    <polygon class="fill" points="0,${ht} ${line} ${w},${ht}"/><polyline points="${line}"/></svg>`;
}
function card(i,idx){
  const rk=S.sort==="views"&&idx<3?`<div class="rank${idx===0?" r1":""}">${idx+1}</div>`:"";
  return`<div class="vc" id="vc${idx}">
    <div class="thumb">${thumb(i)}
      <div class="badge"><span class="bd ${i.platform==="유튜브"?"yt":"ig"}"></span>${i.platform==="유튜브"?"YouTube":"Instagram"}</div>${rk}
    </div>
    <div class="vc-body">
      <div class="vc-client">${esc(i.client)}</div>
      <div class="vc-title">${esc(i.title)}</div>
      <div class="vc-stats">
        <div class="vc-views"><div class="l">조회수</div><div class="n">${fmt(i.views)}</div></div>
        ${chg(i.daily)}${spark(i.hist)}
      </div>
    </div>
  </div>`;
}

/* ---------- 모달 ---------- */
function lineChart(h){
  if(!h||h.length<2)return'<div class="none">내일부터 성장 그래프가 그려져요</div>';
  const W=560,H=190,L=14,R=14,T=18,B=26;
  const vs=h.map(p=>p[1]),min=Math.min(...vs),max=Math.max(...vs),rg=max-min||1;
  const X=i=>L+(i/(h.length-1))*(W-L-R), Y=v=>T+(1-(v-min)/rg)*(H-T-B);
  const pts=h.map((p,i)=>[X(i),Y(p[1])]);
  const line=pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const d0=new Date(h[0][0]*1000),d1=new Date(h[h.length-1][0]*1000);
  const dl=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const last=pts[pts.length-1];
  return`<svg width="100%" viewBox="0 0 ${W} ${H}">
    <polygon fill="url(#sg)" points="${L},${H-B} ${line} ${W-R},${H-B}"/>
    <polyline class="chart-line" points="${line}"/>
    <circle class="chart-dot" cx="${last[0]}" cy="${last[1]}" r="4"/>
    <text class="chart-val" x="${Math.min(last[0],W-70)}" y="${Math.max(last[1]-10,12)}">${fmt(max)}</text>
    <text class="chart-lbl" x="${L}" y="${H-8}">${dl(d0)}</text>
    <text class="chart-lbl" x="${W-R}" y="${H-8}" text-anchor="end">${dl(d1)}</text>
  </svg>`;
}
function openModal(i){
  const days=i.date?Math.max(1,Math.round((Date.now()-new Date(i.date))/864e5)):null;
  $("#mcard").innerHTML=`
    <div class="m-top"><div class="m-client">${esc(i.client)} · ${esc(i.platform)}${i.date?" · "+i.date:""}</div>
      <button class="m-x" onclick="closeModal()">✕</button></div>
    <div class="m-title">${esc(i.title)}</div>
    <div class="m-chart"><h5>Views Trend</h5>${lineChart(i.hist)}</div>
    <div class="m-grid">
      <div class="m-stat"><div class="l">조회수</div><div class="v">${full(i.views)}</div></div>
      <div class="m-stat"><div class="l">일일 증가</div><div class="v">${i.daily!=null?(i.daily>0?"+":"")+full(i.daily):"-"}</div></div>
      <div class="m-stat"><div class="l">주간 증가</div><div class="v">${i.weekly!=null?(i.weekly>0?"+":"")+full(i.weekly):"-"}</div></div>
      <div class="m-stat"><div class="l">시간당 조회수</div><div class="v">${full(i.hourly)}</div></div>
      <div class="m-stat"><div class="l">좋아요</div><div class="v">${full(i.likes)}</div></div>
      <div class="m-stat"><div class="l">댓글</div><div class="v">${full(i.comments)}</div></div>
      ${days?`<div class="m-stat"><div class="l">게시 경과</div><div class="v">${days}일</div></div>`:""}
    </div>
    <a class="m-link" href="${esc(i.url)}" target="_blank" rel="noopener">영상 보러가기 ↗</a>`;
  $("#modal").classList.add("on");
}
function closeModal(){$("#modal").classList.remove("on")}
$("#modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
</script>
</body>
</html>
