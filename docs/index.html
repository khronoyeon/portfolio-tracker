<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>유니콘하우스 콘텐츠 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#FAFAF9; --card:#FFFFFF; --well:#F5F5F4;
  --line:#EBEBEA; --line-dark:#E0E0DF;
  --tx:#111110; --tx2:#78716C; --tx3:#B8B4B0;
  --green:#0FBE4E; --neon:#1FE05F; --green-soft:rgba(31,224,95,.09);
  --ink:#111110; --red:#DC2E44;
  --r:20px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;min-height:100vh;font-feature-settings:"tnum"}
body::before{content:"";position:fixed;left:0;right:0;top:0;height:440px;background:radial-gradient(58% 100% at 50% 0%,rgba(31,224,95,.08),transparent 72%);pointer-events:none;z-index:0}
#app .wrap{position:relative;z-index:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.kpis,.hero,.panel,.cl-card,.hof-card,.hof-row,.vc{animation:fadeUp .55s cubic-bezier(.2,.8,.3,1) both}
.grid .vc:nth-child(2),.cl-grid .cl-card:nth-child(2){animation-delay:.05s}
.grid .vc:nth-child(3),.cl-grid .cl-card:nth-child(3){animation-delay:.1s}
.grid .vc:nth-child(4),.cl-grid .cl-card:nth-child(4){animation-delay:.15s}
.grid .vc:nth-child(5){animation-delay:.2s}
.grid .vc:nth-child(6){animation-delay:.25s}
::selection{background:rgba(31,224,95,.3)}
button,input,select{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::placeholder{color:var(--tx3)}

.micro{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--tx3);text-transform:uppercase}

/* ---------- 로고 ---------- */
.logo-img{display:block;width:auto}
.logo-img.lg{height:56px;margin:0 auto 20px}
.logo-img.sm{height:24px}

/* ---------- 잠금 화면 ---------- */
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;background:var(--bg)}
.gate-card{width:min(360px,90vw);text-align:center}
.logo-uh.lg{font-size:30px;margin-bottom:18px}
.gate-sub{color:var(--tx2);font-size:14px;font-weight:500;margin-bottom:36px}
.gate-card input{width:100%;background:var(--card);border:1px solid var(--line-dark);border-radius:12px;padding:14px 16px;font-size:15px;outline:none;transition:all .15s;text-align:center;font-weight:600}
.gate-card input:focus{border-color:var(--tx);box-shadow:0 0 0 3px rgba(17,17,16,.06)}
.gate-card button{width:100%;margin-top:10px;background:var(--ink);color:var(--neon);border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.gate-card button:hover{opacity:.88}
.gate-card button:active{transform:scale(.985)}
.gate-err{color:var(--red);font-size:13px;font-weight:600;height:18px;margin-top:14px}
.shake{animation:shake .35s}
@keyframes shake{20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

/* ---------- 레이아웃 ---------- */
.wrap{max-width:1120px;margin:0 auto;padding:0 clamp(16px,3.5vw,32px) 64px}
header{position:sticky;top:10px;z-index:30;display:flex;align-items:center;gap:13px;margin:14px 0 18px;padding:11px 16px;background:rgba(255,255,255,.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(17,17,16,.06);border-radius:18px;box-shadow:0 8px 30px rgba(17,17,16,.05)}
.logo-uh.sm{font-size:14px}
header .h-title{font-size:15.5px;font-weight:800;letter-spacing:-.02em}
header .h-sub{margin-left:auto;font-size:12px;color:var(--tx3);font-weight:500;text-align:right}
header .h-sub b{color:var(--tx2);font-weight:600;font-variant-numeric:tabular-nums}
.h-collect{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:var(--neon);font-size:12.5px;font-weight:700;border-radius:999px;padding:9px 15px;white-space:nowrap;transition:all .2s}
.h-collect:hover{box-shadow:0 8px 22px rgba(31,224,95,.4);transform:translateY(-1px)}

.sec{margin-top:36px;margin-bottom:14px;display:flex;align-items:baseline;gap:10px}
.sec h2{font-size:16px;font-weight:800;letter-spacing:-.02em}
.sec .micro{transform:translateY(-1px)}

/* ---------- KPI : 한 카드 안에 4분할 ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.kpi{padding:24px 26px;position:relative}
.kpi+.kpi{border-left:1px solid var(--line)}
.kpi h3{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:14px}
.kpi .v{font-size:clamp(26px,2.7vw,34px);font-weight:900;letter-spacing:-.045em;font-variant-numeric:tabular-nums}
.kpi .v .u{font-size:14px;font-weight:600;color:var(--tx2);letter-spacing:0;margin-left:2px}
.kpi .s{font-size:12px;color:var(--tx3);margin-top:8px;font-weight:500;font-variant-numeric:tabular-nums}
.kpi .s.up{color:var(--green);font-weight:700}
.kpi .tick{position:absolute;top:26px;right:24px;width:6px;height:6px;border-radius:50%;background:var(--neon)}
@media(max-width:860px){
  .kpis{grid-template-columns:1fr 1fr}
  .kpi:nth-child(3){border-left:none}
  .kpi:nth-child(n+3){border-top:1px solid var(--line)}
}

/* ---------- 히어로 차트 ---------- */
.hero{position:relative;overflow:hidden;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px 8px;margin-top:14px}
.hero::after{content:"";position:absolute;left:-70px;top:-90px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(31,224,95,.14),transparent 68%);pointer-events:none}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:relative;z-index:1}
.hero h4{font-size:13px;font-weight:700;color:var(--tx2);margin-bottom:8px}
.hero-num{font-size:clamp(30px,3.5vw,44px);font-weight:900;letter-spacing:-.05em;font-variant-numeric:tabular-nums}
.hero-num small{font-size:14px;font-weight:600;color:var(--tx3);letter-spacing:0;margin-left:6px}
.hero-chip{background:var(--ink);color:var(--neon);font-weight:800;border-radius:999px;padding:7px 13px;font-size:12.5px;white-space:nowrap}
#herochart{position:relative;margin-top:6px}
#herochart svg{display:block;width:100%}
.tip{position:absolute;background:var(--ink);color:#fff;font-size:11.5px;font-weight:700;padding:7px 11px;border-radius:10px;pointer-events:none;transform:translate(-50%,-135%);white-space:nowrap;display:none;z-index:2}
.tip b{color:var(--neon)}

/* ---------- 필터 칩 ---------- */
.chips{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:-4px 0 14px}
.chip-f{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border:none;border-radius:999px;padding:8px 13px;font-size:12.5px;font-weight:700;cursor:pointer;transition:opacity .12s}
.chip-f:hover{opacity:.82}
.chip-f b{color:var(--neon);font-weight:800}
.chip-f .x{opacity:.55;font-size:11px}
.chip-clear{background:none;border:none;color:var(--tx3);font-size:12.5px;font-weight:700;cursor:pointer;padding:8px 4px}
.chip-clear:hover{color:var(--tx)}

/* ---------- 상태 태그 ---------- */
.status{position:absolute;bottom:10px;right:10px;font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:999px;backdrop-filter:blur(6px)}
.status.hot{background:var(--neon);color:#08260F;box-shadow:0 4px 14px rgba(31,224,95,.45)}
.status.stall{background:rgba(255,255,255,.92);color:var(--tx2)}

/* ---------- 클라이언트 보드 ---------- */
/* ---------- 명예의 전당 ---------- */
.hof-top{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px}
@media(max-width:720px){.hof-top{grid-template-columns:1fr}}
.hof-card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .16s}
.hof-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(17,17,16,.08)}
.hof-card.first{border-color:var(--neon);box-shadow:0 0 0 3px var(--green-soft),0 12px 34px rgba(31,224,95,.18)}
.hof-thumb{aspect-ratio:16/9;background:var(--well);position:relative;overflow:hidden}
.hof-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s cubic-bezier(.2,.8,.3,1)}
.hof-card:hover .hof-thumb img{transform:scale(1.06)}
.hof-rank{position:absolute;top:10px;left:10px;background:var(--ink);color:var(--neon);font-weight:900;font-size:13px;min-width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.hof-body{padding:14px 16px 16px}
.hof-title{font-size:13.5px;font-weight:700;line-height:1.4;height:2.8em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:10px}
.hof-meta{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.hof-views{font-size:19px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.hof-sub{font-size:11px;color:var(--tx3);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hof-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 14px;margin-bottom:8px;cursor:pointer;transition:all .13s}
.hof-row:hover{border-color:var(--line-dark);transform:translateX(2px)}
.hof-row .hr-num{font-size:12px;font-weight:800;color:var(--tx3);width:22px;font-variant-numeric:tabular-nums}
.hof-row img{width:56px;height:32px;object-fit:cover;border-radius:6px;background:var(--well);flex-shrink:0}
.hof-row .hr-title{flex:1;min-width:0;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hof-row .hr-cl{font-size:11px;color:var(--tx3);font-weight:600;white-space:nowrap}
.hof-row .hr-views{font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}

.cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px}
.cl-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 19px;cursor:pointer;transition:all .15s}
.cl-card:hover{border-color:var(--line-dark);box-shadow:0 8px 24px rgba(17,17,16,.07);transform:translateY(-2px)}
.cl-top{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.cl-name{font-size:15px;font-weight:800;letter-spacing:-.01em}
.cl-st{font-size:10px;font-weight:800;border-radius:6px;padding:3px 8px}
.cl-st.on{background:var(--green-soft);color:var(--neon-deep)}
.cl-st.pause{background:#FFF4D6;color:#9A6B00}
.cl-st.off{background:var(--well);color:var(--tx3)}
.cl-warn{margin-left:auto;font-size:10.5px;font-weight:800;color:#C2410C;background:#FFF0E6;border-radius:6px;padding:3px 8px;white-space:nowrap}
.cl-quota{font-size:12.5px;font-weight:700;display:flex;justify-content:space-between;align-items:baseline}
.cl-quota .cq-r{font-size:11px;color:var(--tx3);font-weight:600}
.cl-quota .cq-r.behind{color:#B45309}
.cl-quota .cq-r.done{color:var(--neon-deep)}
.cl-bar{height:6px;border-radius:999px;background:var(--well);overflow:hidden;margin:8px 0 12px}
.cl-fill{height:100%;border-radius:999px;background:var(--neon);transition:width .4s}
.cl-fill.behind{background:#F59E0B}
.cl-meta{font-size:11.5px;color:var(--tx3);font-weight:600;display:flex;justify-content:space-between;align-items:center}
.cl-trend{font-size:12px;font-weight:800}
.cl-trend.up{color:var(--neon-deep)}
.cl-trend.down{color:var(--red)}
.cl-trend.flat{color:var(--tx3)}

/* ---------- 워크로드 ---------- */
.wl-row{display:flex;align-items:center;gap:12px;padding:7px 0}
.wl-name{font-size:12.5px;font-weight:700;width:70px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-track{flex:1;height:8px;border-radius:999px;background:var(--well);overflow:hidden}
.wl-fill{height:100%;background:var(--neon);border-radius:999px}
.wl-val{font-size:11.5px;font-weight:700;color:var(--tx2);width:110px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
#workload{border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:18px}
#workload h5{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:8px}

/* ---------- 인사이트 ---------- */
.insights{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:14px}
@media(max-width:860px){.insights{grid-template-columns:minmax(0,1fr)}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px;min-width:0}
.panel-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.panel h4{font-size:14px;font-weight:800;letter-spacing:-.01em}

/* 랭킹 리스트 */
.rk-row{display:flex;align-items:center;gap:14px;padding:11px 0}
.rk-row+.rk-row{border-top:1px solid var(--line)}
.rk-num{font-size:12px;font-weight:800;color:var(--tx3);width:20px;font-variant-numeric:tabular-nums}
.rk-row.first .rk-num{color:var(--green)}
.rk-main{flex:1;min-width:0}
.rk-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:7px}
.rk-track{height:4px;border-radius:999px;background:var(--well);overflow:hidden}
.rk-fill{height:100%;border-radius:999px;background:var(--line-dark)}
.rk-row.first .rk-fill{background:var(--neon)}
.rk-val{font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.rk-row.first .rk-val{color:var(--green)}
.panel-empty{color:var(--tx3);font-size:13px;font-weight:500;padding:36px 0;text-align:center}

/* 팀 분석 */
.tm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:12px}
.tm-card{border:1px solid var(--line);border-radius:14px;padding:18px 19px;cursor:pointer;transition:all .15s;background:var(--card)}
.tm-card:hover{border-color:var(--line-dark);box-shadow:0 8px 24px rgba(17,17,16,.07);transform:translateY(-2px)}
.tm-card .nm{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;margin-bottom:14px}
.tm-card .nm .tm-role{font-size:10px;font-weight:700;color:var(--tx2);background:var(--well);border-radius:6px;padding:3px 7px}
.tm-card .avg{font-size:23px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.tm-card .avg small{font-size:11px;color:var(--tx3);font-weight:600;margin-left:4px;letter-spacing:0}
.tm-card .sub{font-size:12px;color:var(--tx3);font-weight:500;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tm-card .best{font-size:11.5px;color:var(--tx2);font-weight:600;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tm-card .best b{color:var(--green)}
/* 팀원 상세 모달의 영상 행 */
.pv-row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-radius:10px;cursor:pointer;transition:background .12s}
.pv-row:hover{background:var(--well)}
.pv-row+.pv-row{border-top:1px solid var(--line)}
.pv-num{font-size:11.5px;font-weight:800;color:var(--tx3);width:20px;font-variant-numeric:tabular-nums}
.pv-title{flex:1;min-width:0;font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-cl,.rk-cl{display:inline-block;font-size:10.5px;font-weight:700;color:var(--neon-deep);background:var(--green-soft);border-radius:6px;padding:2px 7px;margin-left:7px;vertical-align:1px}
.pv-views{font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums}
.pv-daily{font-size:12px;font-weight:700;color:var(--green);width:70px;text-align:right;font-variant-numeric:tabular-nums}

/* 플랫폼 비중 */
.stack{display:flex;height:10px;border-radius:999px;overflow:hidden;background:var(--well);margin:6px 0 20px}
.stack .sg1{background:var(--neon)}
.stack .sg2{background:var(--ink)}
.leg{display:flex;align-items:center;gap:10px;padding:12px 0}
.leg+.leg{border-top:1px solid var(--line)}
.leg .ldot{width:8px;height:8px;border-radius:3px}
.leg .ldot.g{background:var(--neon)}
.leg .ldot.k{background:var(--ink)}
.leg .ln{font-size:13.5px;font-weight:700;flex:1}
.leg .lv{font-size:13.5px;font-weight:800;font-variant-numeric:tabular-nums}
.leg .lp{font-size:12px;font-weight:600;color:var(--tx3);width:44px;text-align:right;font-variant-numeric:tabular-nums}

/* ---------- 컨트롤 ---------- */
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.controls input[type=search]{flex:1 1 200px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:13.5px;outline:none;font-weight:500;transition:all .15s}
.controls input[type=search]:focus{border-color:var(--tx)}
.controls select,select.selbox{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 32px 9px 13px;font-size:13px;font-weight:600;cursor:pointer;outline:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='9' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2378716C' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center}
.pills{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.pills button{background:none;border:none;border-radius:7px;padding:6px 13px;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .12s}
.pills button.on{background:var(--neon);color:#08260F}

/* ---------- 카드 그리드 ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.vc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .16s}
.vc:hover{border-color:var(--line-dark);box-shadow:0 10px 30px rgba(17,17,16,.07);transform:translateY(-2px)}
.thumb{position:relative;aspect-ratio:16/9;background:var(--well);overflow:hidden}
.thumb.v{aspect-ratio:4/5}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s cubic-bezier(.2,.8,.3,1)}
.vc:hover .thumb img{transform:scale(1.06)}
.thumb .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.thumb .ph svg{width:30px;height:30px;color:var(--tx3)}
.badge{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:999px;background:rgba(255,255,255,.94);color:var(--tx);backdrop-filter:blur(4px)}
.badge .bd{width:6px;height:6px;border-radius:50%}
.badge .bd.yt{background:#FF0000}
.badge .bd.ig{background:#DD2A7B}
.rank{position:absolute;top:10px;right:10px;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:var(--ink);color:#fff;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
.live{position:absolute;bottom:10px;left:10px;display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:999px;background:var(--ink);color:var(--neon)}
.live .ldot2{width:6px;height:6px;border-radius:50%;background:var(--neon);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.rank.r1{color:var(--neon)}
.vc-body{padding:16px 18px 17px}
.vc-client{font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:6px}
.vc-title{font-size:14.5px;font-weight:700;line-height:1.42;height:2.84em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:14px;letter-spacing:-.01em}
.vc-stats{display:flex;align-items:flex-end;gap:12px}
.vc-views .n{font-size:20px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.vc-views .l{font-size:10.5px;color:var(--tx3);font-weight:600;margin-bottom:3px}
.chg{font-size:12.5px;font-weight:700;margin-bottom:2px;white-space:nowrap;font-variant-numeric:tabular-nums}
.chg.up{color:var(--green)}
.chg.zero{color:var(--tx3)}
.chg.dn{color:var(--red)}
.spark{margin-left:auto;flex-shrink:0}

.spark .fill{fill:url(#sg);stroke:none}
.empty{grid-column:1/-1;text-align:center;color:var(--tx3);padding:80px 0;font-size:14px;font-weight:500}

/* ---------- 모달 ---------- */
#modal{position:fixed;inset:0;background:rgba(17,17,16,.32);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:flex-end;justify-content:center;z-index:40}
#modal.on{display:flex}
.m-card{width:min(620px,100vw);max-height:92vh;overflow-y:auto;background:var(--card);border-radius:20px 20px 0 0;padding:26px 26px 30px;animation:up .26s cubic-bezier(.2,.9,.3,1)}
@media(min-width:700px){#modal{align-items:center;padding:20px}.m-card{border-radius:20px}}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.m-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.m-client{font-size:12px;font-weight:600;color:var(--tx2)}
.m-x{margin-left:auto;background:none;border:1px solid var(--line);width:32px;height:32px;border-radius:10px;font-size:13px;color:var(--tx2);cursor:pointer;flex-shrink:0;transition:all .15s}
.m-x:hover{border-color:var(--line-dark);color:var(--tx)}
.m-back{margin-left:0;margin-right:2px;width:auto;padding:0 12px;font-size:12.5px;font-weight:700}
.m-title{font-size:19px;font-weight:800;line-height:1.35;margin-bottom:22px;letter-spacing:-.02em}
.m-chart{border:1px solid var(--line);border-radius:14px;padding:16px 12px 6px;margin-bottom:14px}
.m-chart h5{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--tx3);text-transform:uppercase;margin:0 8px 4px}
.m-chart .none{color:var(--tx3);font-size:13px;font-weight:500;text-align:center;padding:34px 0}
.m-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(126px,1fr));gap:8px;margin-bottom:18px}
.m-stat{border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.m-stat .l{font-size:10.5px;color:var(--tx3);font-weight:600;margin-bottom:5px}
.m-stat .v{font-size:15.5px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.m-link{display:block;text-align:center;background:var(--ink);color:var(--neon);font-weight:700;font-size:14.5px;border-radius:12px;padding:15px;transition:all .15s}
.m-link:hover{opacity:.88}
.m-link:active{transform:scale(.99)}
.chart-line{fill:none;stroke:var(--neon);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.chart-dot{fill:var(--neon)}
.chart-lbl{fill:var(--tx3);font-size:10px;font-weight:600;font-family:inherit}
.chart-val{fill:var(--tx2);font-size:10px;font-weight:700}

footer{text-align:center;color:var(--tx3);font-size:12px;font-weight:500;padding:44px 0 8px}
</style>
</head>
<body>

<svg width="0" height="0"><defs>
  <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1FE05F" stop-opacity=".18"/>
    <stop offset="1" stop-color="#1FE05F" stop-opacity="0"/>
  </linearGradient>
</defs></svg>

<script>
"use strict";
let DATA=null;
const S={q:"",plat:"",client:"",planner:"",shooter:"",editor:"",month:"",sort:"views"};
const $=s=>document.querySelector(s);
const CLAP='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M3 8l2.5-4.5L21 8M8.5 7.5L11 3M14 7.5L16.5 3"/></svg>';

/* ---------- 숫자 표기 ---------- */
function fmt(n){
  if(n==null)return"-";
  const a=Math.abs(n);
  if(a>=1e8)return trim(n/1e8)+"억";
  if(a>=1e4)return trim(n/1e4)+"만";
  return n.toLocaleString("ko-KR");
}
const trim=x=>{const v=Math.round(x*10)/10;return v%1===0?String(Math.round(v)):v.toFixed(1)};
const full=n=>n==null?"-":n.toLocaleString("ko-KR");

/* 숫자 카운트업 애니메이션 */
function countUp(id,target,prefix){
  const el=document.getElementById(id);
  if(!el)return;
  const t0=performance.now(),ms=750;
  function tick(t){
    const p=Math.min(1,(t-t0)/ms),e=1-Math.pow(1-p,3);
    el.textContent=(prefix||"")+fmt(Math.round(target*e));
    if(p<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ---------- 복호화 ---------- */
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(blob,pw){
  pw=pw.trim().normalize("NFC");
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(blob.salt),iterations:blob.iter,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(blob.iv)},key,b64(blob.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlock(pw,silent){
  try{
    const res=await fetch("data.json?t="+Date.now());
    if(!res.ok)throw new Error("data");
    DATA=await decrypt(await res.json(),pw);
    sessionStorage.setItem("uh_pw",pw);
    $("#gate").style.display="none";$("#app").style.display="";
    boot();
  }catch(e){
    sessionStorage.removeItem("uh_pw");
    if(!silent){
      $("#err").textContent="비밀번호가 올바르지 않아요";
      const c=$(".gate-card");c.classList.remove("shake");void c.offsetWidth;c.classList.add("shake");
    }
  }
}
$("#go").onclick=()=>unlock($("#pw").value,false);
$("#pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock($("#pw").value,false)});
const saved=sessionStorage.getItem("uh_pw");
if(saved)unlock(saved,true);

/* ---------- 부팅 ---------- */
function boot(){
  $("#gen").textContent=DATA.generated;
  const clients=[...new Set(DATA.items.map(i=>i.client))].sort();
  $("#client").innerHTML='<option value="">모든 클라이언트</option>'+clients.map(c=>`<option>${esc(c)}</option>`).join("");
  const planners=[...new Set(DATA.items.map(i=>i.planner).filter(Boolean))].sort();
  $("#planner").innerHTML='<option value="">모든 기획자</option>'+planners.map(c=>`<option>${esc(c)}</option>`).join("");
  const shooters=[...new Set(DATA.items.map(i=>i.shooter).filter(Boolean))].sort();
  $("#shooter").innerHTML='<option value="">모든 촬영자</option>'+shooters.map(c=>`<option>${esc(c)}</option>`).join("");
  const editors=[...new Set(DATA.items.map(i=>i.editor).filter(Boolean))].sort();
  $("#editor").innerHTML='<option value="">모든 편집자</option>'+editors.map(c=>`<option>${esc(c)}</option>`).join("");
  const months=[...new Set(DATA.items.filter(i=>i.date).map(i=>i.date.slice(0,7)))].sort().reverse();
  const monthOpts='<option value="">전체 기간</option><option value="7d">최근 7일 업로드</option><option value="30d">최근 30일 업로드</option>'
    +months.map(m=>{const[y,mo]=m.split("-");return`<option value="${m}">${y}년 ${+mo}월</option>`}).join("");
  $("#month").innerHTML=monthOpts;
  $("#teammonth").innerHTML=monthOpts;
  $("#kpimonth").innerHTML=monthOpts;
  $("#kpimonth").onchange=e=>{S.month=e.target.value;$("#month").value=S.month;render()};
  $("#q").oninput=e=>{S.q=e.target.value.trim();render()};
  $("#client").onchange=e=>{S.client=e.target.value;render()};
  $("#planner").onchange=e=>{S.planner=e.target.value;render()};
  $("#shooter").onchange=e=>{S.shooter=e.target.value;render()};
  $("#editor").onchange=e=>{S.editor=e.target.value;render()};
  $("#month").onchange=e=>{S.month=e.target.value;$("#kpimonth").value=S.month;render()};
  $("#sort").onchange=e=>{S.sort=e.target.value;render()};
  document.querySelectorAll("#plat button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#plat button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");S.plat=b.dataset.v;render();
  });
  // 주소(URL)에 저장된 필터 상태 복원 — 필터 건 화면을 링크로 공유 가능
  const hp=new URLSearchParams(location.hash.slice(1));
  ["q","plat","client","planner","shooter","editor","month","sort"].forEach(k=>{
    const v=hp.get(k);if(v)S[k]=v;
  });
  applyControls();
  render();
  renderHof();
  renderClients();
  renderAccounts();
  renderTeamGrid();
}

function inPeriod(i,per){
  if(!per)return true;
  if(per==="7d"||per==="30d"){
    if(!i.date)return false;
    const days=per==="7d"?7:30;
    return (Date.now()-new Date(i.date).getTime())<=days*864e5;
  }
  return (i.date||"").startsWith(per);
}

function filtered(){
  let arr=DATA.items.filter(i=>
    (!S.plat||i.platform===S.plat)&&
    (!S.client||i.client===S.client)&&
    (!S.planner||i.planner===S.planner)&&
    (!S.shooter||i.shooter===S.shooter)&&
    (!S.editor||i.editor===S.editor)&&
    inPeriod(i,S.month)&&
    (!S.q||(i.title+i.client).toLowerCase().includes(S.q.toLowerCase())));
  const key={views:i=>i.views,daily:i=>i.daily??-1,weekly:i=>i.weekly??-1,date:i=>i.date||""}[S.sort];
  return arr.sort((a,b)=>key(b)>key(a)?1:key(b)<key(a)?-1:0);
}

/* ---------- 렌더 ---------- */
function render(){
  const arr=filtered();
  renderKpis(arr);
  renderHero(arr);
  renderRank(arr);
  renderPlat(arr);
  renderChips();
  syncURL();
  $("#cnt").textContent=arr.length+"개";
  $("#grid").innerHTML=arr.length?arr.map(card).join(""):'<div class="empty">조건에 맞는 영상이 없어요</div>';
  arr.forEach((it,i)=>{const el=document.getElementById("vc"+i);if(el)el.onclick=()=>openModal(it)});
}

/* ---------- 히어로 차트: 전체 조회수 성장 곡선 ---------- */
function totalSeries(arr){
  const ts=new Set();
  arr.forEach(i=>(i.hist||[]).forEach(h=>ts.add(h[0])));
  const times=[...ts].sort((a,b)=>a-b);
  if(times.length<2)return null;
  return times.map(t=>{
    let sum=0;
    arr.forEach(i=>{
      let v=0;
      for(const e of i.hist||[]){if(e[0]<=t)v=e[1];else break}
      sum+=v;
    });
    return [t,sum];
  });
}

let HERO_PTS=null,HERO_GEO=null;
function renderHero(arr){
  const pts=totalSeries(arr);
  const el=$("#hero");
  if(!pts||pts.length<2){el.style.display="none";return}
  el.style.display="";
  const total=pts[pts.length-1][1];
  $("#heronum").innerHTML='<span id="heroval">'+fmt(total)+'</span><small>'+full(total)+"회</small>";
  countUp("heroval",total);
  const lastT=pts[pts.length-1][0];
  const weekBase=[...pts].reverse().find(p=>p[0]<=lastT-7*86400)||pts[0];
  const d=total-weekBase[1];
  $("#herodelta").textContent=(d>=0?"▲ +":"▼ ")+fmt(Math.abs(d))+" · 최근 7일";

  const W=1060,H=230,L=6,R=6,T=16,B=26;
  const t0=pts[0][0],t1=lastT,vs=pts.map(p=>p[1]);
  const min=Math.min(...vs),max=Math.max(...vs),rg=max-min||1;
  const X=t=>L+(t-t0)/(t1-t0||1)*(W-L-R);
  const Y=v=>T+(1-(v-min)/rg)*(H-T-B);
  const xy=pts.map(p=>[X(p[0]),Y(p[1])]);
  const line=xy.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const dl=t=>{const d=new Date(t*1000);return (d.getMonth()+1)+"/"+d.getDate()};
  const last=xy[xy.length-1];
  HERO_PTS=pts;HERO_GEO={W,H,t0,t1,min,rg,T,B,L,R};
  $("#herochart").innerHTML=`<div class="tip" id="herotip"></div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:230px">
      <polygon fill="url(#sg)" points="${L},${H-B} ${line} ${W-R},${H-B}"/>
      <polyline class="chart-line" style="stroke-width:3" points="${line}"/>
      <circle class="chart-dot" cx="${last[0]}" cy="${last[1]}" r="5"/>
      <circle cx="${last[0]}" cy="${last[1]}" r="10" fill="rgba(31,224,95,.25)"/>
      <text class="chart-lbl" x="${L+4}" y="${H-8}">${dl(t0)}</text>
      <text class="chart-lbl" x="${W-R-4}" y="${H-8}" text-anchor="end">${dl(t1)}</text>
    </svg>`;
  const box=$("#herochart"),tip=$("#herotip");
  box.onmousemove=e=>{
    if(!HERO_PTS)return;
    const r=box.getBoundingClientRect();
    const t=HERO_GEO.t0+((e.clientX-r.left)/r.width)*(HERO_GEO.t1-HERO_GEO.t0);
    let best=HERO_PTS[0];
    for(const p of HERO_PTS)if(Math.abs(p[0]-t)<Math.abs(best[0]-t))best=p;
    const px=(X(best[0])/W)*r.width;
    const py=(Y(best[1])/H)*230;
    const dd=new Date(best[0]*1000);
    tip.style.display="block";tip.style.left=px+"px";tip.style.top=py+"px";
    tip.innerHTML=(dd.getMonth()+1)+"/"+dd.getDate()+" "+String(dd.getHours()).padStart(2,"0")+"시 · <b>"+fmt(best[1])+"</b>";
  };
  box.onmouseleave=()=>{tip.style.display="none"};
}

/* ---------- 필터 칩 + URL 공유 ---------- */
const CHIP_KEYS={q:"검색",plat:"플랫폼",client:"클라이언트",planner:"기획",editor:"편집",month:"기간",sort:"정렬"};
const SORT_LABEL={daily:"오늘 뜨는 순",date:"최신순",weekly:"주간 증가순"};
function monthLabel(v){
  if(v==="7d")return"최근 7일";if(v==="30d")return"최근 30일";
  const[y,m]=v.split("-");return y+"년 "+(+m)+"월";
}
function renderChips(){
  const chips=[];
  if(S.q)chips.push(["q","검색","“"+S.q+"”"]);
  if(S.plat)chips.push(["plat","플랫폼",S.plat]);
  if(S.client)chips.push(["client","클라이언트",S.client]);
  if(S.planner)chips.push(["planner","기획",S.planner]);
  if(S.shooter)chips.push(["shooter","촬영",S.shooter]);
  if(S.editor)chips.push(["editor","편집",S.editor]);
  if(S.month)chips.push(["month","기간",monthLabel(S.month)]);
  if(S.sort!=="views")chips.push(["sort","정렬",SORT_LABEL[S.sort]||S.sort]);
  $("#chips").innerHTML=chips.map(([k,l,v])=>
    `<button class="chip-f" data-k="${k}">${l} <b>${esc(v)}</b><span class="x">✕</span></button>`).join("")
    +(chips.length>=2?'<button class="chip-clear" id="chipclear">모두 지우기</button>':"");
  document.querySelectorAll("#chips .chip-f").forEach(b=>b.onclick=()=>{
    const k=b.dataset.k;S[k]=k==="sort"?"views":"";applyControls();render();

/* ---------- 클라이언트 보드 ---------- */
function vAt(h,t){let v=null;for(const e of h||[]){if(e[0]<=t)v=e[1];else break}return v}
function incBetween(h,t0,t1){
  if(!h||!h.length)return 0;
  const b=vAt(h,t1);if(b==null)return 0;
  let a=vAt(h,t0);
  if(a==null)a=h[0][0]<=t1?h[0][1]:null;
  return a==null?0:Math.max(0,b-a);
}
function monthNow(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}

function renderClients(){
  const byName={};
  (DATA.clients||[]).forEach(c=>byName[c.name]={...c});
  DATA.items.forEach(i=>{if(!byName[i.client])byName[i.client]={name:i.client,status:"활성"}});
  const now=Date.now()/1000,cur=monthNow();

  const rows=Object.values(byName).map(c=>{
    const vids=DATA.items.filter(i=>i.client===c.name);
    const made=vids.filter(i=>(i.date||"").startsWith(cur)).length;
    const lastDate=vids.map(i=>i.date).filter(Boolean).sort().pop();
    const gap=lastDate?Math.floor((Date.now()-new Date(lastDate))/864e5):null;
    const inc7=vids.reduce((s,i)=>s+incBetween(i.hist,now-7*86400,now),0);
    const prev7=vids.reduce((s,i)=>s+incBetween(i.hist,now-14*86400,now-7*86400),0);
    const trend=prev7>0?(inc7>prev7*1.15?"up":inc7<prev7*0.85?"down":"flat"):(inc7>0?"up":"flat");
    const active=c.status==="활성";
    return {...c,vids:vids.length,total:vids.reduce((s,i)=>s+i.views,0),made,gap,inc7,trend,active};
  }).sort((a,b)=>(b.active-a.active)||(b.total-a.total));

  $("#clcnt").textContent=rows.length+"곳";
  if(!rows.length){$("#clgrid").innerHTML='<div class="empty">클라이언트 데이터가 없어요</div>';return}
  $("#clgrid").innerHTML=rows.map((c,idx)=>{
    const st=c.status==="활성"?"on":c.status==="일시중지"?"pause":"off";
    const tr=c.trend==="up"?"▲ +"+fmt(c.inc7):c.trend==="down"?"▼ +"+fmt(c.inc7):"→ +"+fmt(c.inc7);
    return`<div class="cl-card" id="cl${idx}">
      <div class="cl-top"><span class="cl-name">${esc(c.name)}</span><span class="cl-st ${st}">${esc(c.status)}</span></div>
      <div class="cl-quota"><span>이번 달 ${c.made}개 제작</span>
        <span class="cq-r">${c.gap!=null?"마지막 업로드 "+(c.gap===0?"오늘":c.gap+"일 전"):"업로드 기록 없음"}</span></div>
      <div class="cl-meta" style="margin-top:12px"><span>영상 ${c.vids}개 · 총 ${fmt(c.total)}</span>
        <span class="cl-trend ${c.trend}">${tr} <small style="font-weight:600;color:var(--tx3)">7일</small></span></div>
    </div>`}).join("");
  rows.forEach((c,idx)=>{const el=document.getElementById("cl"+idx);if(el)el.onclick=()=>{
    S.client=c.name;applyControls();render();
    document.getElementById("grid").scrollIntoView({behavior:"smooth",block:"start"});
  }});
}

/* ---------- 팀 목표 + 이번 달 워크로드 ---------- */
function teamGoalHtml(){
  const g=DATA.teamGoal;
  if(!g||(!g.views&&!g.followers))return"";
  const d=new Date();
  const monthStart=new Date(d.getFullYear(),d.getMonth(),1).getTime()/1000;
  const now=Date.now()/1000;
  let html=`<h5>🎯 ${d.getMonth()+1}월 팀 목표 <span style="color:var(--tx3);font-weight:600">· 이번 달 증가량 기준</span></h5>`;
  if(g.views){
    // 모든 영상(신작+기존)이 이번 달 만들어낸 조회수
    const inc=DATA.items.reduce((s,i)=>s+incBetween(i.hist,monthStart,now),0);
    const p=Math.min(100,Math.round(inc/g.views*100));
    html+=`<div class="wl-row"><span class="wl-name">조회수</span>
      <div class="wl-track"><div class="wl-fill" style="width:${p}%"></div></div>
      <span class="wl-val">+${fmt(inc)} / ${fmt(g.views)}${inc>=g.views?" ✅":" ("+p+"%)"}</span></div>`;
  }
  if(g.followers&&(DATA.accounts||[]).length){
    const inc=DATA.accounts.reduce((s,a)=>{
      if(a.followers==null)return s;
      const base=vAt(a.hist,monthStart);
      return s+(base==null?0:Math.max(0,a.followers-base));
    },0);
    const p=Math.min(100,Math.round(inc/g.followers*100));
    html+=`<div class="wl-row"><span class="wl-name">팔로워</span>
      <div class="wl-track"><div class="wl-fill" style="width:${p}%"></div></div>
      <span class="wl-val">+${fmt(inc)} / ${fmt(g.followers)}${inc>=g.followers?" ✅":" ("+p+"%)"}</span></div>`;
  }
  return html+'<div style="height:14px"></div>';
}

/* ---------- 영상 상태 자동 판정 ---------- */
function statusOf(i){
  if(i.daily==null||!i.hist||i.hist.length<3)return null;
  const h=i.hist,incs=[];
  for(let k=1;k<h.length-1;k++){
    const dt=(h[k][0]-h[k-1][0])/86400;
    if(dt>0)incs.push((h[k][1]-h[k-1][1])/dt);
  }
  const avg=incs.length?incs.reduce((a,b)=>a+b,0)/incs.length:null;
  if(avg!=null&&i.daily>=Math.max(500,avg*2))return"hot";
  const days=i.date?(Date.now()-new Date(i.date))/864e5:999;
  if(days>7&&i.daily<Math.max(50,i.views*0.001))return"stall";
  return null;
}

function teamAgg(role){
  const m={};
  DATA.items.forEach(i=>{
    if(!inPeriod(i,TEAM_MONTH))return;
    const name=i[role];
    if(!name)return;
    (m[name]=m[name]||{name,items:[]}).items.push(i);
  });
  return Object.values(m).map(p=>{
    const sum=p.items.reduce((s,i)=>s+i.views,0);
    const daily=p.items.reduce((s,i)=>s+(i.daily||0),0);
    const top=[...p.items].sort((a,b)=>b.views-a.views)[0];
    return {...p,n:p.items.length,sum,daily,avg:Math.round(sum/p.items.length),top};
  }).sort((a,b)=>b.avg-a.avg);
}

let MODAL_BACK=null;
function modalBack(){
  const back=MODAL_BACK;
  MODAL_BACK=null;
  if(back)back();
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

function thumb(i){
  if(i.th)return`<img loading="lazy" src="${esc(i.th)}" alt="">`;
  if(i.yt)return`<img loading="lazy" src="https://i.ytimg.com/vi/${i.yt}/hqdefault.jpg" alt="">`;
  return`<div class="ph">${CLAP}</div>`;
}
function chg(d){
  if(d==null)return"";
  const cls=d>0?"up":d<0?"dn":"zero";
  const sign=d>0?"+":"";
  return`<div class="chg ${cls}">${sign}${fmt(d)}</div>`;
}
function spark(h){
  if(!h||h.length<2)return"";
  const w=72,ht=32,vs=h.map(p=>p[1]);
  const min=Math.min(...vs),max=Math.max(...vs),rg=max-min||1;
  const pts=h.map((p,i)=>[(i/(h.length-1))*w,ht-3-((p[1]-min)/rg)*(ht-6)]);
  const line=pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  return`<svg class="spark" width="${w}" height="${ht}" viewBox="0 0 ${w} ${ht}">
    <polygon class="fill" points="0,${ht} ${line} ${w},${ht}"/><polyline points="${line}"/></svg>`;
}

      <div class="badge"><span class="bd ${i.platform==="유튜브"?"yt":"ig"}"></span>${i.platform==="유튜브"?"YouTube":"Instagram"}</div>${rk}
      ${i.watch?'<div class="live"><span class="ldot2"></span>집중 관찰중</div>':""}
      ${(s=>s==="hot"?'<div class="status hot">🔥 급상승</div>':s==="stall"?'<div class="status stall">💤 정체</div>':"")(statusOf(i))}

      <div class="vc-title">${esc(i.title)}</div>
      <div class="vc-stats">
        <div class="vc-views"><div class="l">조회수</div><div class="n">${fmt(i.views)}</div></div>
        ${chg(i.daily)}${spark(i.hist)}
      </div>
    </div>
  </div>`;
}

/* ---------- 모달 ---------- */
function lineChart(h){
  if(!h||h.length<2)return'<div class="none">내일부터 성장 그래프가 그려져요</div>';
  const W=560,H=190,L=14,R=14,T=18,B=26;
  const vs=h.map(p=>p[1]),min=Math.min(...vs),max=Math.max(...vs),rg=max-min||1;
  const X=i=>L+(i/(h.length-1))*(W-L-R), Y=v=>T+(1-(v-min)/rg)*(H-T-B);
  const pts=h.map((p,i)=>[X(i),Y(p[1])]);
  const line=pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const d0=new Date(h[0][0]*1000),d1=new Date(h[h.length-1][0]*1000);
  const dl=d=>`${d.getMonth()+1}/${d.getDate()}`;
  const last=pts[pts.length-1];
  return`<svg width="100%" viewBox="0 0 ${W} ${H}">
    <polygon fill="url(#sg)" points="${L},${H-B} ${line} ${W-R},${H-B}"/>
    <polyline class="chart-line" points="${line}"/>
    <circle class="chart-dot" cx="${last[0]}" cy="${last[1]}" r="4"/>
    <text class="chart-val" x="${Math.min(last[0],W-70)}" y="${Math.max(last[1]-10,12)}">${fmt(max)}</text>
    <text class="chart-lbl" x="${L}" y="${H-8}">${dl(d0)}</text>
    <text class="chart-lbl" x="${W-R}" y="${H-8}" text-anchor="end">${dl(d1)}</text>
  </svg>`;
}
function openModal(i,back){
  MODAL_BACK=back||null;
  const days=i.date?Math.max(1,Math.round((Date.now()-new Date(i.date))/864e5)):null;
  $("#mcard").innerHTML=`
    <div class="m-top">${back?'<button class="m-x m-back" onclick="modalBack()">← 뒤로</button>':""}
      <div class="m-client">${esc(i.client)} · ${esc(i.platform)}${i.date?" · "+i.date:""}</div>
      <button class="m-x" onclick="closeModal()">✕</button></div>
    <div class="m-title">${esc(i.title)}</div>
    <div class="m-chart"><h5>Views Trend</h5>${lineChart(i.hist)}</div>
    <div class="m-grid">
      <div class="m-stat"><div class="l">조회수</div><div class="v">${full(i.views)}</div></div>
      ${i.first48!=null?`<div class="m-stat"><div class="l">초동 조회수 (48시간)</div><div class="v">${full(i.first48)}</div></div>`:""}
      <div class="m-stat"><div class="l">일일 증가</div><div class="v">${i.daily!=null?(i.daily>0?"+":"")+full(i.daily):"-"}</div></div>
      <div class="m-stat"><div class="l">주간 증가</div><div class="v">${i.weekly!=null?(i.weekly>0?"+":"")+full(i.weekly):"-"}</div></div>
      <div class="m-stat"><div class="l">좋아요</div><div class="v">${full(i.likes)}</div></div>
      <div class="m-stat"><div class="l">댓글</div><div class="v">${full(i.comments)}</div></div>
      ${days?`<div class="m-stat"><div class="l">게시 경과</div><div class="v">${days}일</div></div>`:""}
      ${i.planner||i.shooter||i.editor?`<div class="m-stat"><div class="l">담당</div><div class="v" style="font-size:13px;line-height:1.5">${[i.planner&&"기획 "+esc(i.planner),i.shooter&&"촬영 "+esc(i.shooter),i.editor&&"편집 "+esc(i.editor)].filter(Boolean).join("<br>")}</div></div>`:""}
    </div>
    <a class="m-link" href="${esc(i.url)}" target="_blank" rel="noopener">영상 보러가기 ↗</a>`;
  $("#modal").classList.add("on");
}
function closeModal(){MODAL_BACK=null;$("#modal").classList.remove("on")}
$("#modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
</script>
</body>
</html>
