name: 신작 집중 관찰 (3시간마다)

on:
  schedule:
    # 매일 3시간 간격 (KST 12시·15시·18시·21시·자정·새벽3시·아침6시)
    # 오전 9시는 기존 일일 수집이 담당하므로 제외
    - cron: "0 3,6,9,12,15,18,21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: tracker-update
  cancel-in-progress: false

jobs:
  fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 신작(3일 이내)만 수집
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FRESH_ONLY: "1"
        run: python update_stats.py

      - name: 대시보드 데이터 생성 (암호화)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          pip install --quiet cryptography
          python build_site.py

      - name: 대시보드 배포
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "신작 데이터 갱신"
          git pull --rebase origin main || true
          git push
