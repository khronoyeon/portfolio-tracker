name: 🔄 지금 전체 수집 (수동)

on:
  workflow_dispatch: {}   # GitHub 웹의 Run workflow 버튼으로만 실행

permissions:
  contents: write

concurrency:
  group: tracker-update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 전체 수집 (오래된 영상 포함)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FORCE_ALL: "1"
        run: python update_stats.py

      - name: 대시보드 데이터 생성 (암호화)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          pip install --quiet cryptography
          python build_site.py

      - name: 대시보드 배포
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "수동 전체 수집"
          git pull --rebase origin main || true
          git push
